defaults:
  output: true
  output_type: file
  email: null
status:
  cache-purge: disabled
  cache-clear: disabled
  default-site-backup: disabled
modern:
  enabled: false
  workers: 1
  retry:
    enabled: true
    max_attempts: 3
    backoff: exponential
  queue:
    path: 'user-data://scheduler/queue'
    max_size: 1000
  webhook:
    enabled: false
    token: null
    path: /scheduler/webhook
  health:
    enabled: true
    path: /scheduler/health
  history:
    enabled: true
    retention_days: 30
    path: 'user-data://scheduler/history'
  performance:
    job_timeout: 300
    lock_timeout: 10
  monitoring:
    enabled: false
    alert_on_failure: true
    alert_email: null
    webhook_url: null
  triggers:
    check_cron: true
    check_systemd: true
    check_webhook: true
    check_external: true
